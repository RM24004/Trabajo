<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor de Video</title>

    <!-- Enlace al CSS -->
    <link rel="stylesheet" href="stile06.css">
</head>
<body>

<!-- Contenedor principal (como una tarjeta) -->
<div class="player">

    <!-- Título del video -->
    <h2>Rick Astley - Never Gonna Give You Up 🎬</h2>

    <!-- Descripción -->
    <p>Video del popular del artista Rick Astley famoso por su canción icónica
        que se ha convertido en un meme de internet conocido como "Rickrolling".
    </p>
    <!-- Video -->
    <!-- controls = muestra botones (play, pausa, volumen, etc.) -->
    <video controls>
        <!-- Cambia "video.mp4" por el nombre de tu archivo -->
        <source src="video.mp4" type="video/mp4">

        <!-- Mensaje si el navegador no soporta video -->
        Tu navegador no soporta video
    </video>

</div>

</body>
</html>
