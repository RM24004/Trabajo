<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }
    table {
        border-collapse: collapse;
        width: 50%;
        margin: 20px auto;
        align-items: baseline;
    }
    th, td {
        border: 1px solid #5751b6;
        padding: 8px;
        text-align: center;
    }
    th {
        background-color: #6b6b6b;
    }
    td {
        background-color: #f8d9d9;
    }
 
</style>
<script>
let nota1, nota2, nota3;
let dato1, dato2, dato3, media;
let print1, print2, print3, resultat;
dato1 = window.prompt("Primer número?", "0");
nota1 = parseInt(dato1);
dato2 = window.prompt("Segundo número?", "0");
nota2 = parseInt(dato2);
dato3 = window.prompt("Tercer número?", "0");
nota3 = parseInt(dato3);
media = (nota1 + nota2 + nota3)/3;
if (media >=5)
{
resultat = "Aprobado";
}
else
{
resultat = "Suspendido";
}
</script>
</head>
<body>
<table border="1">
    <tr>
        <th>Nota 1</th>
        <th>Nota 2</th>
        <th>Nota 3</th>
        <th>Media</th>
        <th>Resultado</th>
    </tr>
    <tr>
        <td><script>document.write(nota1)</script></td>
        <td><script>document.write(nota2)</script></td>
        <td><script>document.write(nota3)</script></td>
        <td><script>document.write(media.toFixed(2))</script></td>
        <td><script>document.write(resultat)</script></td>
    </tr>
</table>
    </body>
    </html>
