<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<div id="salida"></div>
<script>
let dato = window.prompt("Introduce un número o texto:", "0");
let num = parseInt(dato);

let resultado;
if (isNaN(num)) {
  // Si no es número, duplicar el texto
  resultado = dato + dato;
} else {
  // Si es número, calcular el doble
  resultado = num * 2;
}

document.getElementById("salida").innerHTML = `El doble es ${resultado} `;
</script>
</body>
</html>
