<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dado en JavaScript</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f4f4f9;
    }
    #dado {
      font-size: 80px;
      margin: 20px;
      color: #333;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <h2>🎲 Lanzar un dado</h2>
  <div id="dado">-</div>
  <button onclick="tirarDado()">Tirar</button>

  <script>
    function tirarDado() {
      // Genera número aleatorio entre 1 y 6
      let numero = Math.floor(Math.random() * 6) + 1;
      document.getElementById("dado").innerHTML = numero;
    }
  </script>
</body>
</html>
